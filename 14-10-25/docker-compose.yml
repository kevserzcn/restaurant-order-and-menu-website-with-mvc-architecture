version: '3.8'

services:
  # Database initialization service
  db-init:
    build: .
    volumes:
      - db_data:/app/instance
    command: python init_db.py
    profiles:
      - init

  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ./static/invoices:/app/static/invoices
      - db_data:/app/instance   # 👈 burada instance klasörü yerine docker volume kullanıyoruz
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - DATABASE_URL=sqlite:////app/instance/restaurant.db
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  db_data:     # 👈 Bu volume veritabanını kalıcı yapar
  static_invoices:
  static_uploads:
